<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FacilityOps - Offline</title>
    <meta name="theme-color" content="#4f46e5">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #1e1b4b, #312e81, #1e1b4b);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .offline-container {
            text-align: center;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px 30px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #fff;
        }

        p {
            color: #a5b4fc;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        .features {
            text-align: left;
            margin-bottom: 24px;
        }

        .features h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #e0e7ff;
        }

        .features ul {
            list-style: none;
            padding: 0;
        }

        .features li {
            color: #a5b4fc;
            font-size: 14px;
            margin-bottom: 8px;
            padding-left: 20px;
            position: relative;
        }

        .features li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: bold;
        }

        .retry-btn {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .retry-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status.offline::before {
            content: "●";
            color: #ef4444;
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="icon">🏗️</div>
        <h1>You're Offline</h1>
        <p>FacilityOps is currently unavailable. Don't worry - your data is safe and will sync when you're back online.</p>

        <div class="status offline">
            <span>Offline Mode</span>
        </div>

        <div class="features">
            <h3>Available Features:</h3>
            <ul>
                <li>View cached facility data</li>
                <li>Access previously loaded pages</li>
                <li>Automatic data synchronization</li>
                <li>Background sync for updates</li>
            </ul>
        </div>

        <button class="retry-btn" onclick="window.location.reload()">
            Try Again
        </button>
    </div>

    <script>
        // Check online status
        function updateOnlineStatus() {
            const statusElement = document.querySelector('.status');
            const retryBtn = document.querySelector('.retry-btn');

            if (navigator.onLine) {
                statusElement.className = 'status online';
                statusElement.innerHTML = '<span>Back Online</span>';
                retryBtn.textContent = 'Reload App';
                retryBtn.onclick = () => window.location.href = '/';

                // Auto-reload after 3 seconds when back online
                setTimeout(() => {
                    window.location.href = '/';
                }, 3000);
            } else {
                statusElement.className = 'status offline';
                statusElement.innerHTML = '<span>Offline Mode</span>';
                retryBtn.textContent = 'Try Again';
                retryBtn.onclick = () => window.location.reload();
            }
        }

        // Listen for online/offline events
        window.addEventListener('online', updateOnlineStatus);
        window.addEventListener('offline', updateOnlineStatus);

        // Initial check
        updateOnlineStatus();
    </script>
</body>
</html>
